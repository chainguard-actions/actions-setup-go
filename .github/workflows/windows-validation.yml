name: Validate Windows installation

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

permissions: {}

jobs:
  create-link-if-not-default:
    runs-on: windows-latest
    name: 'Validate if symlink is created'
    strategy:
      matrix:
        cache: [false, true]
        go: [1.20.1]
    steps:
      - uses: actions/checkout@a37ce9120846195fa4ece8f58b268e6043cb2f26 # v3

      - name: 'Setup ${{ matrix.cache }}, cache: ${{ matrix.go }}'
        uses: ./
        with:
          go-version: ${{ matrix.go }}
          cache: ${{ matrix.cache }}

      - name: 'Drive C: should have zero size link'
        env:
          GO_VERSION: ${{ matrix.go }}
        run: |
          du -m -s "C:\\hostedtoolcache\\windows\\go\\${GO_VERSION}\\x64"
          # make sure drive c: contains only a link
          size=$(du -m -s "C:\\hostedtoolcache\\windows\\go\\${GO_VERSION}\\x64"|cut -f1 -d$'\t')
          if [ $size -ne 0 ];then
            echo 'Size of the link created on drive c: must be 0'
            exit 1
          fi
        shell: bash

      # Drive D: is small, take care the action does not eat up the space
      - name: 'Drive D: space usage should be below 1G'
        env:
          GO_VERSION: ${{ matrix.go }}
        run: |
          du -m -s "D:\\hostedtoolcache\\windows\\go\\${GO_VERSION}\\x64"
          size=$(du -m -s "D:\\hostedtoolcache\\windows\\go\\${GO_VERSION}\\x64"|cut -f1 -d$'\t')
          # make sure archive does not take lot of space
          if [ $size -gt 999 ];then
            echo 'Size of installed on drive d: go is too big';
            exit 1
          fi
        shell: bash

      # make sure the Go installation has not been changed to the end user
      - name: Test paths and environments
        env:
          GO_VERSION: ${{ matrix.go }}
        run: |
          echo $PATH
          which go
          go version
          go env
          if [ $(which go) != "/c/hostedtoolcache/windows/go/${GO_VERSION}/x64/bin/go" ];then
            echo "which go should return \"/c/hostedtoolcache/windows/go/${GO_VERSION}/x64/bin/go\""
            exit 1
          fi
          if [ $(go env GOROOT) != "C:\\hostedtoolcache\\windows\\go\\${GO_VERSION}\\x64" ];then
            echo "go env GOROOT should return \"C:\\hostedtoolcache\\windows\\go\\${GO_VERSION}\\x64\""
            exit 1
          fi
        shell: bash

  find-default-go:
    name: 'Find default go version'
    runs-on: windows-latest
    outputs:
      version: ${{ steps.goversion.outputs.version }}
    steps:
      - run: |
          version=`go env GOVERSION|sed s/^go//`
          echo "default go version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
        id: goversion
        shell: bash

  dont-create-link-if-default:
    name: 'Validate if symlink is not created for default go'
    runs-on: windows-latest
    needs: find-default-go
    strategy:
      matrix:
        cache: [false, true]
    steps:
      - uses: actions/checkout@a37ce9120846195fa4ece8f58b268e6043cb2f26 # v3

      - name: 'Setup default go, cache: ${{ matrix.cache }}'
        uses: ./
        with:
          go-version: ${{ needs.find-default-go.outputs.version }}
          cache: ${{ matrix.cache }}

      - name: 'Drive C: should have Go installation, cache: ${{ matrix.cache}}'
        env:
          DEFAULT_GO_VERSION: ${{ needs.find-default-go.outputs.version }}
        run: |
          size=$(du -m -s "C:\\hostedtoolcache\\windows\\go\\${DEFAULT_GO_VERSION}\\x64"|cut -f1 -d$'\t')
          if [ $size -eq 0 ];then
            echo 'Size of the hosted go installed on drive c: must be above zero'
            exit 1
          fi
        shell: bash

      - name: 'Drive D: should not have Go installation, cache: ${{ matrix.cache}}'
        env:
          DEFAULT_GO_VERSION: ${{ needs.find-default-go.outputs.version }}
        run: |
          if [ -e "D:\\hostedtoolcache\\windows\\go\\${DEFAULT_GO_VERSION}\\x64" ];then
            echo "D:\\hostedtoolcache\\windows\\go\\${DEFAULT_GO_VERSION}\\x64 should not exist for hosted version of go";
            exit 1
          fi
        shell: bash
