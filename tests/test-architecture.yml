name: Test architecture input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup-go
        uses: .
        with:
          go-version: '1.21'
          architecture: 'x64'
          cache: false
      - name: Assert go-version output is set
        env:
          ACTUAL: ${{ steps.setup-go.outputs.go-version }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: go-version output was empty"
            exit 1
          fi
          echo "PASS: go-version output is '$ACTUAL'"
      - name: Assert Go binary is available and is x64
        run: |
          which go
          go version
          GOARCH=$(go env GOARCH)
          echo "GOARCH: $GOARCH"
          if [ "$GOARCH" != "amd64" ]; then
            echo "FAIL: expected amd64 but got $GOARCH"
            exit 1
          fi
          echo "PASS"
