name: Test Go setup with explicit architecture
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          go-version: '1.21.0'
          architecture: 'x64'
          cache: false
      - name: Assert go-version output is set
        env:
          ACTUAL: ${{ steps.setup.outputs.go-version }}
        run: |
          echo "actual go-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: go-version output is empty"
            exit 1
          fi
          echo "PASS: go-version output is set to $ACTUAL"
      - name: Assert Go is installed for x64 architecture
        run: |
          echo "which go: $(which go)"
          GO_VER="$(go version)"
          echo "go version: $GO_VER"
          if ! echo "$GO_VER" | grep -q "go1.21"; then
            echo "FAIL: expected go1.21.x but got: $GO_VER"
            exit 1
          fi
          if ! echo "$GO_VER" | grep -q "amd64\|linux/amd64"; then
            echo "FAIL: expected amd64 architecture but got: $GO_VER"
            exit 1
          fi
          echo "PASS: Go 1.21 installed for x64/amd64 architecture"
