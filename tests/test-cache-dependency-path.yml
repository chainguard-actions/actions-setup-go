name: Test cache-dependency-path input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a go.mod and go.sum for cache-dependency-path
        run: |
          mkdir -p /tmp/goproject
          cat > /tmp/goproject/go.mod <<'EOF'
          module example.com/test

          go 1.21
          EOF
          touch /tmp/goproject/go.sum

      - id: action
        uses: .
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: /tmp/goproject/go.sum

      - name: Assert go-version output is set
        env:
          ACTUAL: ${{ steps.action.outputs.go-version }}
        run: |
          echo "actual go-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: go-version output is empty"
            exit 1
          fi
          echo "PASS: go-version output is '$ACTUAL'"

      - name: Assert Go is on PATH
        run: |
          which go
          go version
          echo "PASS: go is available on PATH"
