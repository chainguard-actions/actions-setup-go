name: Test cache-dependency-path input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create go.mod for cache dependency
        run: |
          mkdir -p myapp
          cat > myapp/go.mod <<'EOF'
          module example.com/myapp

          go 1.21
          EOF
      - id: setup
        uses: .
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: 'myapp/go.mod'
      - name: Assert go-version output is set
        env:
          ACTUAL: ${{ steps.setup.outputs.go-version }}
        run: |
          echo "actual go-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: go-version output was empty"
            exit 1
          fi
          echo "PASS: go-version output is '$ACTUAL'"
      - name: Assert Go is on PATH
        run: |
          which go
          go version
          echo "PASS: go is available on PATH"
