name: Test cache-dependency-path input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a go.sum file for cache dependency
        run: |
          mkdir -p /tmp/goproject
          touch /tmp/goproject/go.sum
      - id: setup-go
        uses: .
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: /tmp/goproject/go.sum
      - name: Assert go-version output is set
        env:
          ACTUAL: ${{ steps.setup-go.outputs.go-version }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: go-version output was empty"
            exit 1
          fi
          echo "PASS: go-version=$ACTUAL"
      - name: Assert go binary is available
        run: |
          which go
          go version
          echo "PASS"
