name: Test Go setup from .go-version file
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create .go-version fixture
        run: |
          echo "1.22.0" > /tmp/.go-version
      - id: setup
        uses: .
        with:
          go-version-file: '/tmp/.go-version'
          cache: false
      - name: Assert go-version output is set
        env:
          ACTUAL: ${{ steps.setup.outputs.go-version }}
        run: |
          echo "actual go-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: go-version output is empty"
            exit 1
          fi
          echo "PASS: go-version output is '$ACTUAL'"
      - name: Assert Go binary is in PATH
        run: |
          if ! command -v go &>/dev/null; then
            echo "FAIL: go binary not found in PATH"
            exit 1
          fi
          echo "PASS: go found at $(command -v go)"
      - name: Assert Go version matches .go-version file
        run: |
          INSTALLED=$(go version)
          echo "installed: $INSTALLED"
          if ! echo "$INSTALLED" | grep -q "go1.22.0"; then
            echo "FAIL: expected go1.22.0 but got: $INSTALLED"
            exit 1
          fi
          echo "PASS"
