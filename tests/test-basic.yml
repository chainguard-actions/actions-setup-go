name: Test basic Go version setup
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup-go
        uses: .
        with:
          go-version: '1.21.x'
          cache: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Assert go-version output is set
        env:
          ACTUAL: ${{ steps.setup-go.outputs.go-version }}
        run: |
          echo "actual go-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: go-version output is empty"
            exit 1
          fi
          echo "PASS: go-version output is '$ACTUAL'"
      - name: Assert Go is on PATH and version matches
        run: |
          echo "which go: $(which go)"
          GO_VER="$(go version)"
          echo "go version: $GO_VER"
          if ! echo "$GO_VER" | grep -q "go1\.21"; then
            echo "FAIL: expected go1.21.x but got: $GO_VER"
            exit 1
          fi
          echo "PASS: Go 1.21.x is installed"
