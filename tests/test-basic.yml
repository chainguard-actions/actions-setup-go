name: Test basic Go version setup
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup-go
        uses: .
        with:
          go-version: '1.21.x'
          cache: false
      - name: Assert go-version output is set
        env:
          ACTUAL: ${{ steps.setup-go.outputs.go-version }}
        run: |
          echo "actual go-version output: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: go-version output is empty"
            exit 1
          fi
          echo "PASS: go-version output is '$ACTUAL'"
      - name: Assert Go is available in PATH
        run: |
          which go
          go version
          echo "PASS: go is available in PATH"
      - name: Assert Go version matches requested
        run: |
          INSTALLED=$(go version | grep -oE '[0-9]+\.[0-9]+' | head -1)
          echo "installed major.minor: $INSTALLED"
          if [ "$INSTALLED" != "1.21" ]; then
            echo "FAIL: expected Go 1.21.x, got $INSTALLED"
            exit 1
          fi
          echo "PASS"
