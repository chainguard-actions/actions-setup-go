name: Test Go setup with cache disabled
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup-go
        uses: .
        with:
          go-version: '1.21.x'
          cache: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Assert go-version output is set
        env:
          ACTUAL: ${{ steps.setup-go.outputs.go-version }}
        run: |
          echo "actual go-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: go-version output is empty"
            exit 1
          fi
          echo "PASS: go-version output is '$ACTUAL'"
      - name: Assert Go binary is functional
        run: |
          go version
          go env GOPATH
          go env GOROOT
          echo "PASS: Go environment is functional"
      - name: Assert GOPATH is accessible via go env
        run: |
          GOPATH_VAL="$(go env GOPATH)"
          echo "GOPATH: $GOPATH_VAL"
          if [ -z "$GOPATH_VAL" ]; then
            echo "FAIL: GOPATH is not set (via go env)"
            exit 1
          fi
          echo "PASS: GOPATH is set to '$GOPATH_VAL'"
