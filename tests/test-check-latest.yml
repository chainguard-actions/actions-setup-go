name: Test Go setup with check-latest enabled
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: setup
        uses: .
        with:
          go-version: '1.21'
          check-latest: true
          cache: false
      - name: Assert go-version output is set
        env:
          ACTUAL: ${{ steps.setup.outputs.go-version }}
        run: |
          echo "actual go-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: go-version output is empty"
            exit 1
          fi
          echo "PASS: go-version output is '$ACTUAL'"
      - name: Assert Go binary is available
        run: |
          which go
          go version
          echo "PASS: go binary found in PATH"
      - name: Assert installed version is at least 1.21
        run: |
          INSTALLED=$(go version | awk '{print $3}' | sed 's/go//')
          echo "installed version: $INSTALLED"
          MAJOR=$(echo "$INSTALLED" | cut -d. -f1)
          MINOR=$(echo "$INSTALLED" | cut -d. -f2)
          if [ "$MAJOR" -lt 1 ] || { [ "$MAJOR" -eq 1 ] && [ "$MINOR" -lt 21 ]; }; then
            echo "FAIL: expected version >= 1.21, got $INSTALLED"
            exit 1
          fi
          echo "PASS: installed version $INSTALLED is >= 1.21"
