name: Test Go setup with check-latest
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          go-version: '1.22.x'
          check-latest: true
          cache: false
      - name: Assert go-version output is set
        env:
          ACTUAL: ${{ steps.setup.outputs.go-version }}
        run: |
          echo "actual go-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: go-version output is empty"
            exit 1
          fi
          echo "PASS: go-version output is '$ACTUAL'"
      - name: Assert Go 1.22.x is installed
        run: |
          GO_VER="$(go version)"
          echo "go version: $GO_VER"
          if ! echo "$GO_VER" | grep -q "go1.22"; then
            echo "FAIL: expected go1.22.x but got: $GO_VER"
            exit 1
          fi
          echo "PASS"
