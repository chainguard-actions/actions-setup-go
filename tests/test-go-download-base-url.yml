name: Test go-download-base-url input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup-go
        uses: .
        with:
          go-version: '1.21'
          cache: false
          go-download-base-url: 'https://go.dev/dl'
      - name: Assert go-version output is set
        env:
          ACTUAL: ${{ steps.setup-go.outputs.go-version }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: go-version output was empty"
            exit 1
          fi
          echo "PASS: go-version=$ACTUAL"
      - name: Assert go binary is available
        run: |
          which go
          go version
          echo "PASS"
