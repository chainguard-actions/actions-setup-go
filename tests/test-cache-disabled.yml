name: Test Go setup with cache disabled
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: setup
        uses: .
        with:
          go-version: '1.22.x'
          cache: false
      - name: Assert go-version output is set
        env:
          ACTUAL: ${{ steps.setup.outputs.go-version }}
        run: |
          echo "actual go-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: go-version output is empty"
            exit 1
          fi
          echo "PASS: go-version output is '$ACTUAL'"
      - name: Assert cache-hit output is empty or false when cache disabled
        env:
          CACHE_HIT: ${{ steps.setup.outputs.cache-hit }}
        run: |
          echo "cache-hit: '$CACHE_HIT'"
          if [ "$CACHE_HIT" = "true" ]; then
            echo "FAIL: cache-hit should not be true when cache is disabled"
            exit 1
          fi
          echo "PASS: cache-hit is '$CACHE_HIT' (not true, as expected with cache disabled)"
      - name: Assert Go binary is available
        run: |
          which go
          go version
          echo "PASS: go binary found in PATH"
